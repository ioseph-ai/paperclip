packages:
  - packages/*
  - packages/adapters/*
  - packages/plugins/*
  # Keep this published reference plugin installable as a standalone package
  # without forcing root pnpm-lock.yaml churn for its third-party deps.
  - "!packages/plugins/paperclip-plugin-e2b"
  - packages/plugins/examples/*
  # Keep this smoke fixture installable as a local plugin example without
  # forcing PRs to commit pnpm-lock.yaml for a new workspace importer.
  - "!packages/plugins/examples/plugin-orchestration-smoke-example"
  - server
  - ui
  - cli
